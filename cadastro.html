<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumos Locadora</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>Lumos Locadora</h1>
      <div class="header-actions">
        <select id="filtro" onchange="filtrar()">
          <option value="todos">Todos</option>
          <option value="Fantasia">Fantasia</option>
          <option value="Ação">Ação</option>
          <option value="Terror">Terror</option>
          <option value="Suspense">Suspense</option>
          <option value="Romance">Romance</option>
        </select>

        <button onclick="abrirModal()">+ Novo Filme</button>
      </div>
    </header>
    <main>
      <table>
        <thead>
          <tr>
            <th>Capa</th>
            <th>Nome</th>
            <th>Genêro</th>
            <th>Ano</th>
            <th>Classificação</th>
            <th>Produtora</th>
          </tr>
        </thead>
        <tbody id="dados"></tbody>
      </table>
    </main>
    <!--Criar Modal-->
    <div id="modal" class="modal">
      <div class="modal-content">
        <h2>Novo Filme</h2>
        <input type="text" id="capa" placeholder="Capa">
        <input type="text" id="nome" placeholder="Nome" />
        <input type="text" id="genero" placeholder="Genêro" />
        <input type="date" id="ano" placeholder="Ano de Lançamento" />
        <input type="text" id="classificacao" placeholder="Classificação" />
        <input type="text" id="produtora" placeholder="Produtora" />

        <div class="modal-buttons">
          <button onclick="salvarFilme()">Salvar</button>
          <button onclick="fecharModal()">Cancelar</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
